version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: cpmnew_mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: cpmroot2024
      MYSQL_DATABASE: cpmnew_db
      MYSQL_USER: cpmuser
      MYSQL_PASSWORD: cpmpass2024
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data:
